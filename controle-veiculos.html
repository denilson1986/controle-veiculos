<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Controle de Veículos — Leve e Pesado</title>
<style>
  :root{
    --bg:#0f172a; --panel:#1e293b; --panel2:#273449; --line:#334155;
    --txt:#e2e8f0; --muted:#94a3b8; --accent:#38bdf8; --accent2:#0ea5e9;
    --ok:#22c55e; --warn:#f59e0b; --danger:#ef4444; --chip:#0b1220;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;background:var(--bg);color:var(--txt);font-size:14px}
  header{background:linear-gradient(90deg,#0ea5e9,#2563eb);padding:12px 20px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  header h1{font-size:18px;margin:0;font-weight:700}
  header .sub{color:#dbeafe;font-size:12px}
  header .spacer{flex:1}
  .btn{background:var(--accent2);color:#fff;border:none;padding:8px 14px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600}
  .btn:hover{filter:brightness(1.1)}
  .btn.ghost{background:transparent;border:1px solid rgba(255,255,255,.5);color:#fff}
  .btn.sm{padding:5px 10px;font-size:12px}
  .btn.danger{background:var(--danger)}
  .btn.gray{background:#475569}
  .btn.green{background:#16a34a}
  nav{display:flex;gap:4px;background:var(--panel);padding:8px 16px;border-bottom:1px solid var(--line);flex-wrap:wrap}
  nav button{background:transparent;color:var(--muted);border:none;padding:9px 14px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600}
  nav button.active{background:var(--panel2);color:var(--accent)}
  main{padding:20px;max-width:1200px;margin:0 auto}
  .grid{display:grid;gap:16px}
  .cards{grid-template-columns:repeat(auto-fill,minmax(280px,1fr))}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:16px}
  .card h3{margin:0 0 4px;font-size:15px}
  .plate{display:inline-block;background:var(--chip);border:1px solid var(--line);padding:2px 8px;border-radius:6px;font-family:monospace;letter-spacing:1px;font-size:12px}
  .tag{display:inline-block;font-size:11px;padding:2px 8px;border-radius:20px;font-weight:700}
  .tag.leve{background:#0e7490;color:#cffafe}
  .tag.pesado{background:#7c2d12;color:#fed7aa}
  .cat{display:inline-block;font-size:11px;padding:2px 8px;border-radius:6px;background:#334155;color:#cbd5e1}
  .metric{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px dashed var(--line);font-size:13px}
  .metric:last-child{border-bottom:none}
  .metric b{color:#fff}
  .muted{color:var(--muted)}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th,td{text-align:left;padding:9px 10px;border-bottom:1px solid var(--line)}
  th{color:var(--muted);font-weight:600;font-size:12px;text-transform:uppercase;letter-spacing:.5px}
  tr:hover td{background:rgba(255,255,255,.02)}
  .toolbar{display:flex;gap:10px;align-items:center;margin-bottom:14px;flex-wrap:wrap}
  .toolbar select,.toolbar input{background:var(--panel);border:1px solid var(--line);color:var(--txt);padding:8px;border-radius:8px}
  .status{font-weight:700;font-size:12px;padding:3px 9px;border-radius:20px;display:inline-block}
  .s-ok{background:rgba(34,197,94,.15);color:#4ade80}
  .s-soon{background:rgba(245,158,11,.15);color:#fbbf24}
  .s-late{background:rgba(239,68,68,.15);color:#f87171}
  a.link{color:var(--accent);text-decoration:none}
  a.link:hover{text-decoration:underline}
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;align-items:flex-start;justify-content:center;padding:40px 16px;overflow:auto;z-index:50}
  .overlay.open{display:flex}
  .modal{background:var(--panel);border:1px solid var(--line);border-radius:14px;width:100%;max-width:560px;padding:22px}
  .modal h2{margin:0 0 16px;font-size:17px}
  .field{margin-bottom:12px}
  .field label{display:block;font-size:12px;color:var(--muted);margin-bottom:5px}
  .field input,.field select,.field textarea{width:100%;background:var(--panel2);border:1px solid var(--line);color:var(--txt);padding:9px;border-radius:8px;font-size:14px}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:18px}
  .empty{text-align:center;color:var(--muted);padding:40px}
  .pill{background:var(--chip);border:1px solid var(--line);padding:4px 10px;border-radius:20px;font-size:12px}
  .big{font-size:26px;font-weight:800;color:#fff}
  .kpi{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:18px}
  .kpi .card{flex:1;min-width:150px}
  .foot{color:var(--muted);font-size:12px;text-align:center;padding:20px}
  .bar-row{display:flex;align-items:center;gap:10px;margin:6px 0;font-size:12px}
  .bar-row .lbl{width:120px;text-align:right;color:var(--muted)}
  .bar-track{flex:1;background:var(--chip);border-radius:6px;height:22px;overflow:hidden;display:flex}
  .bar-seg{height:100%}
  .bar-val{width:120px;font-size:12px;color:#fff}
  .legend{display:flex;gap:14px;font-size:12px;color:var(--muted);margin:6px 0 12px}
  .legend span{display:inline-flex;align-items:center;gap:5px}
  .dot{width:11px;height:11px;border-radius:3px;display:inline-block}
  .drivebox{background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:10px 12px;font-size:12px}
  textarea{font-family:monospace;font-size:12px;resize:vertical}
  @media (max-width:640px){
    header{padding:10px 12px;gap:8px}
    header h1{font-size:16px}
    header .sub{font-size:11px}
    .btn.sm{padding:6px 9px}
    main{padding:12px}
    nav{gap:2px;padding:6px 8px;flex-wrap:nowrap;overflow-x:auto}
    nav button{padding:8px 10px;font-size:12px;white-space:nowrap}
    .row2{grid-template-columns:1fr}
    .modal{padding:16px;border-radius:12px}
    .overlay{padding:16px 8px}
    .card{padding:12px;overflow-x:auto}
    .kpi{gap:10px}
    .kpi .card{min-width:calc(50% - 6px)}
    .big{font-size:22px}
    table{font-size:12px}
    th,td{padding:6px 6px}
    .bar-row .lbl{width:74px}
    .bar-val{width:88px}
    .toolbar{gap:8px}
    .toolbar select,.toolbar input{width:100%}
  }
</style>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

<script>
/* ================= CATEGORIAS ================= */
const CATS=['Motor','Freio','Suspensão','Direção','Cabine','Elétrica','Câmbio/Transmissão',
  'Arrefecimento','Pneus e Rodas','Filtros e Óleo','Ar-condicionado','Funilaria/Lataria','Documentação','Outros'];

  'Filtros e Óleo':'#22c55e','Ar-condicionado':'#0ea5e9','Funilaria/Lataria':'#ec4899','Documentação':'#94a3b8','Outros':'#6b7280'};
const COMB_LEVE=['Gasolina comum','Gasolina aditivada','Álcool comum','Álcool aditivado'];
const COMB_PESADO=['Diesel S500','Diesel S10'];
const COMBUSTIVEIS=[...COMB_LEVE,...COMB_PESADO];
const COMB_COLOR={'Gasolina comum':'#ef4444','Gasolina aditivada':'#f97316','Álcool comum':'#22c55e','Álcool aditivado':'#15803d','Diesel S500':'#3b82f6','Diesel S10':'#0ea5e9','Não informado':'#64748b'};
function combsFor(tipo){return tipo==='pesado'?COMB_PESADO:COMB_LEVE;}

/* ================= DADOS ================= */
const KEY='controle_veiculos_v2';
let DB={veiculos:[],abastecimentos:[],manutencoes:[],planos:[]};

const uid=()=>Math.random().toString(36).slice(2,9);
const money=n=>isFinite(n)?n.toLocaleString('pt-BR',{style:'currency',currency:'BRL'}):'—';
const num=(n,d=2)=>isFinite(n)?n.toLocaleString('pt-BR',{minimumFractionDigits:d,maximumFractionDigits:d}):'—';
const fmtDate=s=>{if(!s)return'—';const p=s.split('-');return `${p[2]}/${p[1]}/${p[0]}`;};
const today=()=>new Date().toISOString().slice(0,10);
const mesLabel=ym=>{const[a,m]=ym.split('-');return `${m}/${a}`;};

function normalize(){
  ['veiculos','abastecimentos','manutencoes','planos'].forEach(k=>DB[k]=DB[k]||[]);
  DB.manutencoes.forEach(m=>{
    if(!m.categoria)m.categoria='Outros';
    if(m.parcelado===undefined)m.parcelado=false;
    if(!m.numParcelas||m.numParcelas<1)m.numParcelas=1;
    if(m.dataPrimeiraParcela===undefined)m.dataPrimeiraParcela='';
  });
  DB.planos.forEach(p=>{if(!p.categoria)p.categoria='Outros';});
}

/* ---- parcelamento (vencimento por MÊS de fatura; regra do dia 10) ---- */
function addMesYM(ym,n){let p=ym.split('-').map(Number);const d=new Date(p[0],p[1]-1+n,1);return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');}
// Compra até o dia 10 -> 1ª parcela no mês da compra; após o dia 10 -> mês seguinte
function mesFaturaFromDate(dateStr){
  const s=dateStr||today();const p=s.split('-').map(Number);
  let ym=p[0]+'-'+String(p[1]).padStart(2,'0');
  if(p[2]>10)ym=addMesYM(ym,1);
  return ym;
}
function mesBaseFatura(m){return mesFaturaFromDate(m.data);}
function parcelasDe(m){
  const num=m.parcelado?Math.max(1,+m.numParcelas||1):1;
  const base=mesBaseFatura(m);
  const val=(+m.custo||0)/num;
  const arr=[];
  for(let i=0;i<num;i++)arr.push({n:i+1,mes:addMesYM(base,i),valor:val});
  return arr;
}
function resumoParcelas(m){
  const arr=parcelasDe(m);const cur=today().slice(0,7);
  const pagas=arr.filter(p=>p.mes<cur).length;
  const abertas=arr.filter(p=>p.mes>=cur);
  const emAberto=abertas.reduce((s,p)=>s+p.valor,0);
  return {num:arr.length,pagas,restantes:abertas.length,valorParcela:arr.length?arr[0].valor:0,
    emAberto,quita:arr.length?arr[arr.length-1].mes:mesBaseFatura(m),proxima:abertas[0]||null,arr};
}

      {id:uid(),veiculo:v2,item:'Filtro Racor / combustível',categoria:'Filtros e Óleo',intervaloKm:40000,intervaloMeses:12,ultimaKm:400000,ultimaData:'2026-03-02'},
      {id:uid(),veiculo:v2,item:'Óleo do câmbio',categoria:'Câmbio/Transmissão',intervaloKm:120000,intervaloMeses:36,ultimaKm:360000,ultimaData:'2024-05-10'}

/* ============ ARMAZENAMENTO / NUVEM (Firebase Firestore) ============ */
const CLOUD_KEY='cv_cloud';
let cloud={cfg:null,codigo:'',on:false,db:null,unsub:null};
let saveTimer=null, cst=null, mst=null;
const overlayOpen=()=>document.getElementById('overlay').classList.contains('open');

/* ---- Espelho no OneDrive (para o lembrete) via File System Access ---- */
let mirror={handle:null,on:false,pending:null};
const FS_OK=!!(window.showSaveFilePicker&&window.showOpenFilePicker);
function idbOpen(){return new Promise(res=>{const r=indexedDB.open('cv_db',1);r.onupgradeneeded=()=>r.result.createObjectStore('kv');r.onsuccess=()=>res(r.result);r.onerror=()=>res(null);});}
async function idbSet(k,v){const db=await idbOpen();if(!db)return;db.transaction('kv','readwrite').objectStore('kv').put(v,k);}
async function idbGet(k){const db=await idbOpen();if(!db)return null;return new Promise(res=>{const g=db.transaction('kv').objectStore('kv').get(k);g.onsuccess=()=>res(g.result);g.onerror=()=>res(null);});}
async function writeMirror(){
  if(!mirror.handle)return;
  try{const w=await mirror.handle.createWritable();await w.write(JSON.stringify(DB,null,2));await w.close();mirrorMsg('espelhado');}
  catch(e){mirrorMsg('erro espelho',true);}
}
async function connectMirror(){
  if(location.protocol==='file:'){alert('Para o espelho, abra o app pelo endereço https (o link do GitHub), não por duplo clique.');return;}
  if(!FS_OK){alert('Use o Google Chrome ou Microsoft Edge no computador para ativar o espelho no OneDrive.');return;}
  const abrir=confirm('OK = ESCOLHER o dados-veiculos.json que já existe na pasta do OneDrive.\nCancelar = CRIAR um novo dados-veiculos.json.');
  try{
    let h;
    if(abrir){[h]=await window.showOpenFilePicker({types:[{description:'JSON',accept:{'application/json':['.json']}}]});}
    else{h=await window.showSaveFilePicker({suggestedName:'dados-veiculos.json',types:[{description:'JSON',accept:{'application/json':['.json']}}]});}
    mirror.handle=h;mirror.on=true;await idbSet('mirrorHandle',h);
    await writeMirror();setMirrorUI();
    alert('Espelho ligado! Este aparelho vai manter o dados-veiculos.json do OneDrive atualizado para o lembrete.');
  }catch(e){if(e.name!=='AbortError')alert('Não foi possível ativar o espelho: '+e.message);}
}
async function reconnectMirror(){
  if(!FS_OK)return;
  const h=await idbGet('mirrorHandle');if(!h)return;
  try{const p=await h.queryPermission({mode:'readwrite'});
    if(p==='granted'){mirror.handle=h;mirror.on=true;setMirrorUI();writeMirror();}
    else{mirror.pending=h;const b=document.getElementById('mirrorBar');if(b)b.style.display='block';}
  }catch(e){}
}
async function reconnectMirrorPerm(){
  if(!mirror.pending)return;
  try{const p=await mirror.pending.requestPermission({mode:'readwrite'});
    if(p==='granted'){mirror.handle=mirror.pending;mirror.on=true;document.getElementById('mirrorBar').style.display='none';setMirrorUI();writeMirror();}
  }catch(e){}
}
function setMirrorUI(){
  const el=document.getElementById('mirrorStatus');if(!el)return;
  el.style.display=mirror.on?'inline-block':'none';el.style.background='#065f46';el.style.borderColor='#10b981';el.textContent='💾 espelho OneDrive';
}
function mirrorMsg(msg,err){const el=document.getElementById('mirrorStatus');if(!el||!mirror.on)return;clearTimeout(mst);el.style.display='inline-block';el.textContent=(err?'⚠ ':'✔ ')+msg;el.style.background=err?'#7f1d1d':'#065f46';mst=setTimeout(setMirrorUI,1500);}

function save(){
  try{localStorage.setItem(KEY,JSON.stringify(DB));}catch(e){}
  if(cloud.on){clearTimeout(saveTimer);saveTimer=setTimeout(pushCloud,400);}
  if(mirror.on&&mirror.handle){writeMirror();}
}
function setCloudUI(){
  const el=document.getElementById('cloudStatus');if(!el)return;
  if(cloud.on){el.textContent='☁ '+cloud.codigo;el.style.background='#065f46';el.style.borderColor='#10b981';}
  else{el.textContent='☁ nuvem desligada';el.style.background='';el.style.borderColor='';}
}
function cloudStatus(msg,err){
  const el=document.getElementById('cloudStatus');if(!el)return;clearTimeout(cst);
  el.textContent=(err?'⚠ ':'✔ ')+msg;el.style.background=err?'#7f1d1d':'#065f46';el.style.borderColor=err?'#ef4444':'#10b981';
  cst=setTimeout(setCloudUI,1800);
}
function initCloud(){
  const raw=localStorage.getItem(CLOUD_KEY);if(!raw)return;
  try{const c=JSON.parse(raw);cloud.cfg=c.cfg;cloud.codigo=c.codigo;}catch(e){return;}
  startCloud();
}
function startCloud(){
  if(!cloud.cfg||!cloud.codigo)return;
  if(typeof firebase==='undefined'){cloudStatus('sem internet p/ nuvem',true);return;}
  try{
    if(!firebase.apps.length)firebase.initializeApp(cloud.cfg);
    cloud.db=firebase.firestore();
    cloud.db.enablePersistence({synchronizeTabs:true}).catch(()=>{});
    firebase.auth().onAuthStateChanged(u=>{if(u)subscribe();});
    firebase.auth().signInAnonymously().catch(e=>cloudStatus('erro login: '+(e.code||e.message),true));
    cloud.on=true;setCloudUI();
  }catch(e){cloudStatus('erro: '+e.message,true);}
}
function subscribe(){
  if(cloud.unsub)cloud.unsub();
  const ref=cloud.db.collection('frotas').doc(cloud.codigo);
  cloud.unsub=ref.onSnapshot({includeMetadataChanges:false},snap=>{
    if(!snap.exists){pushCloud();cloudStatus('nuvem criada');return;}
    if(snap.metadata.hasPendingWrites)return; // eco do nosso próprio salvamento
    const d=snap.data();
    if(d&&d.json){try{DB=JSON.parse(d.json);normalize();try{localStorage.setItem(KEY,JSON.stringify(DB));}catch(e){}if(mirror.on&&mirror.handle)writeMirror();if(!overlayOpen())render();cloudStatus('sincronizado');}catch(e){}}
  },err=>cloudStatus('offline',true));
}
function pushCloud(){
  if(!cloud.on||!cloud.db)return;
  cloud.db.collection('frotas').doc(cloud.codigo)
    .set({json:JSON.stringify(DB),ts:Date.now(),updatedAt:firebase.firestore.FieldValue.serverTimestamp()})
    .then(()=>cloudStatus('salvo na nuvem'))
    .catch(e=>cloudStatus('erro ao salvar: '+(e.code||e.message),true));
}

function parseCfg(t){
  try{const o=JSON.parse(t);if(o&&o.apiKey)return o;}catch(e){}
  const o={};const re=/(\w+)\s*:\s*["'\`]([^"'\`]+)["'\`]/g;let m;
  while(m=re.exec(t)){o[m[1]]=m[2];}
  return Object.keys(o).length?o:null;
}
function cloudSave(){
  const cfg=parseCfg(document.getElementById('c_cfg').value.trim());
  const cod=document.getElementById('c_cod').value.trim();
  if(!cfg||!cfg.apiKey||!cfg.projectId){alert('Configuração inválida. Cole o bloco do Firebase contendo apiKey e projectId.');return;}
  if(!cod){alert('Defina um código da frota (a mesma palavra em todos os aparelhos).');return;}
  localStorage.setItem(CLOUD_KEY,JSON.stringify({cfg,codigo:cod}));
  alert('Nuvem configurada! O app vai recarregar para conectar.');
  location.reload();
}
function cloudDisconnect(){
  if(!confirm('Desligar a sincronização neste aparelho? Os dados locais continuam aqui.'))return;
  localStorage.removeItem(CLOUD_KEY);location.reload();
}

/* ============ CÁLCULOS ============ */
function vById(id){return DB.veiculos.find(v=>v.id===id);}
function vNome(id){const v=vById(id);return v?`${v.marca} ${v.modelo} (${v.placa})`:'—';}

function consumoVeiculo(vid){
  const list=DB.abastecimentos.filter(a=>a.veiculo===vid&&a.cheio).sort((a,b)=>a.km-b.km);
  let distTot=0,litrosTot=0;
  for(let i=1;i<list.length;i++){const d=list[i].km-list[i-1].km;if(d>0){distTot+=d;litrosTot+=list[i].litros;}}
  const kmL=litrosTot>0?distTot/litrosTot:NaN;
  return {kmL,l100:isFinite(kmL)?100/kmL:NaN,distTot,litrosTot};
}
function custoManutVeiculo(vid){return DB.manutencoes.filter(m=>m.veiculo===vid).reduce((s,m)=>s+(+m.custo||0),0);}
function custoCombVeiculo(vid){return DB.abastecimentos.filter(a=>a.veiculo===vid).reduce((s,a)=>s+(+a.valor||0),0);}
function custoPorKm(vid){
  const c=consumoVeiculo(vid);
  const list=DB.abastecimentos.filter(a=>a.veiculo===vid);
  const totalGasto=list.reduce((s,a)=>s+(+a.valor||0),0);
  const totalLitros=list.reduce((s,a)=>s+(+a.litros||0),0);
  const precoMedioL=totalLitros>0?totalGasto/totalLitros:NaN;
  const custoKmComb=isFinite(c.kmL)&&isFinite(precoMedioL)?precoMedioL/c.kmL:NaN;
  return {custoKmComb,precoMedioL};
}
function distanciaVeiculo(vid,ano){
  let ks=DB.abastecimentos.filter(a=>a.veiculo===vid&&(!ano||a.data.slice(0,4)===ano)).map(a=>+a.km);
  DB.manutencoes.filter(m=>m.veiculo===vid&&(!ano||m.data.slice(0,4)===ano)).forEach(m=>ks.push(+m.km));
  if(!ano){const v=vById(vid);if(v)ks.push(+v.km);}
  ks=ks.filter(k=>k>0);
  if(ks.length<2)return NaN;
  return Math.max(...ks)-Math.min(...ks);
}

function statusPlano(p){
  const v=vById(p.veiculo);const kmAtual=v?+v.km:0;
  let porKm=null,porTempo=null;
  if(p.intervaloKm>0&&p.ultimaKm!=null&&p.ultimaKm!==''){const prox=+p.ultimaKm+ +p.intervaloKm;porKm={prox,restante:prox-kmAtual};}
  if(p.intervaloMeses>0&&p.ultimaData){const d=new Date(p.ultimaData);d.setMonth(d.getMonth()+ +p.intervaloMeses);const prox=d.toISOString().slice(0,10);const restDias=Math.round((d-new Date(today()))/(1000*60*60*24));porTempo={prox,restDias};}
  let status='ok',motivo=[];
  if(porKm){if(porKm.restante<=0){status='late';motivo.push(`vencido há ${num(-porKm.restante,0)} km`);}else if(porKm.restante<=1000){if(status!=='late')status='soon';motivo.push(`faltam ${num(porKm.restante,0)} km`);}}
  if(porTempo){if(porTempo.restDias<=0){status='late';motivo.push(`vencido há ${-porTempo.restDias} dias`);}else if(porTempo.restDias<=30){if(status!=='late')status='soon';motivo.push(`faltam ${porTempo.restDias} dias`);}}
  return {porKm,porTempo,status,motivo,kmAtual};
}
function alertasVeiculo(vid){return DB.planos.filter(p=>p.veiculo===vid).map(p=>({p,st:statusPlano(p)})).filter(x=>x.st.status!=='ok');}

function anosDisponiveis(){
  const s=new Set();
  DB.abastecimentos.forEach(a=>s.add(a.data.slice(0,4)));
  DB.manutencoes.forEach(m=>s.add(m.data.slice(0,4)));
  return [...s].filter(Boolean).sort().reverse();
}
function barChart(rows,fmt){ // rows: [{label,segs:[{val,color}]}]
  const max=Math.max(1,...rows.map(r=>r.segs.reduce((s,x)=>s+x.val,0)));
  return rows.map(r=>{
    const tot=r.segs.reduce((s,x)=>s+x.val,0);
    const segs=r.segs.map(x=>`<div class="bar-seg" style="width:${(x.val/max*100).toFixed(1)}%;background:${x.color}"></div>`).join('');
    return `<div class="bar-row"><div class="lbl">${r.label}</div><div class="bar-track">${segs}</div><div class="bar-val">${fmt(tot)}</div></div>`;
  }).join('');
}
function viewFinance(){
  if(DB.veiculos.length===0)return `<div class="empty">Cadastre veículos e lançamentos para ver a análise financeira.</div>`;
  const fv=window._fFinV||'', fa=window._fFinA||'';

  const totManut=manut.reduce((s,m)=>s+(+m.custo||0),0);

  // manutenção por categoria

/* ============ PLANOS ============ */
function viewPlanos(){
  const filt=window._fPlano||'';
  let list=DB.planos.slice();
  if(filt)list=list.filter(p=>p.veiculo===filt);
  const ord={late:0,soon:1,ok:2};
  list=list.map(p=>({p,st:statusPlano(p)})).sort((a,b)=>ord[a.st.status]-ord[b.st.status]);
  const rows=list.map(function(o){
    const p=o.p,st=o.st;
    const cls=st.status==='late'?'s-late':st.status==='soon'?'s-soon':'s-ok';
    const lbl=st.status==='late'?'VENCIDO':st.status==='soon'?'PRÓXIMO':'EM DIA';
    const kmInfo=st.porKm?`${num(st.porKm.prox,0)} km ${st.porKm.restante<=0?`<span class="muted">(venc. ${num(-st.porKm.restante,0)} km)</span>`:`<span class="muted">(faltam ${num(st.porKm.restante,0)})</span>`}`:'<span class="muted">—</span>';
    const tInfo=st.porTempo?`${fmtDate(st.porTempo.prox)} ${st.porTempo.restDias<=0?`<span class="muted">(vencido)</span>`:`<span class="muted">(${st.porTempo.restDias}d)</span>`}`:'<span class="muted">—</span>';
    return `<tr><td>${vNome(p.veiculo)}</td>
      <td><span class="cat" style="background:${CAT_COLOR[p.categoria]||'#334155'};color:#0b1220;font-weight:700">${p.categoria||'Outros'}</span> ${p.item}</td>
      <td>${p.intervaloKm>0?num(p.intervaloKm,0)+' km':'—'} / ${p.intervaloMeses>0?p.intervaloMeses+' m':'—'}</td>
      <td>${p.ultimaKm!=null&&p.ultimaKm!==''?num(p.ultimaKm,0)+' km':'—'}<div class="muted">${fmtDate(p.ultimaData)}</div></td>
      <td>${kmInfo}</td><td>${tInfo}</td><td><span class="status ${cls}">${lbl}</span></td>
      <td style="text-align:right"><button class="btn sm gray" onclick="marcarFeito('${p.id}')" title="Registrar feito agora">✓ Feito</button> <button class="btn sm gray" onclick="editPlano('${p.id}')">Editar</button> <button class="btn sm danger" onclick="delItem('planos','${p.id}')">×</button></td></tr>`;
  }).join('');
  return `<div class="toolbar"><button class="btn" onclick="editPlano()">+ Novo item de plano</button>${selVeic('_fPlano','Todos os veículos')}</div>
    <div class="card"><table><thead><tr><th>Veículo</th><th>Item</th><th>Interv. (km/tempo)</th><th>Última</th><th>Próx. km</th><th>Próx. tempo</th><th>Status</th><th></th></tr></thead>
    <tbody>${rows||`<tr><td colspan="8" class="empty">Nenhum plano.</td></tr>`}</tbody></table></div>
    <div class="muted" style="margin-top:10px;font-size:12px">💡 Alerta pelo que vencer primeiro: km <b>ou</b> tempo. <b>✓ Feito</b> atualiza para o hodômetro atual e a data de hoje.</div>`;
}

  const m=id?DB.manutencoes.find(x=>x.id===id):{veiculo:(DB.veiculos[0]||{}).id||'',data:today(),km:'',categoria:'Motor',tipo:'',custo:'',oficina:'',obs:''};

function togParc(){
  const parc=document.getElementById('f_pag').value==='parc';
  document.getElementById('f_np').closest('.row2').style.opacity=parc?'1':'.45';
  document.getElementById('f_np').disabled=!parc;
  document.getElementById('wrapDP').style.display=parc?'block':'none';
  calcParcela();
}
function calcParcela(){
  const el=document.getElementById('parcHint');if(!el)return;
  const parc=document.getElementById('f_pag').value==='parc';
  const custo=gn('f_custo'),np=Math.max(1,gn('f_np'));
  if(parc&&custo>0){
    const dataC=document.getElementById('f_data').value||today();
    const base=mesFaturaFromDate(dataC);const quita=addMesYM(base,np-1);
    el.innerHTML=`${np}x de <b>${money(custo/np)}</b> · 1ª parcela na fatura de <b>${mesLabel(base)}</b> · última em <b>${mesLabel(quita)}</b>`;
  } else el.textContent='';
}

function marcarFeito(id){
  const p=DB.planos.find(x=>x.id===id);const v=vById(p.veiculo);
  if(!confirm(`Registrar "${p.item}" como feito hoje (${num(v?v.km:0,0)} km)?`))return;
  p.ultimaKm=v?v.km:p.ultimaKm;p.ultimaData=today();save();render();
}
function delItem(col,id){if(!confirm('Excluir este registro?'))return;DB[col]=DB[col].filter(x=>x.id!==id);save();render();}

/* ============ BACKUP ============ */
function exportJSON(){
  const blob=new Blob([JSON.stringify(DB,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='backup-controle-veiculos-'+today()+'.json';a.click();
}
function importJSON(e){
  const f=e.target.files[0];if(!f)return;const r=new FileReader();
  r.onload=()=>{try{const d=JSON.parse(r.result);if(d.veiculos){DB=d;normalize();save();render();alert('Backup restaurado.');}else alert('Arquivo inválido.');}catch(err){alert('Erro ao ler o arquivo.');}};
  r.readAsText(f);e.target.value='';
}

/* ============ INÍCIO ============ */
function boot(){
  const raw=localStorage.getItem(KEY);
  if(raw){try{DB=JSON.parse(raw);}catch(e){}}
  if(!DB.veiculos||DB.veiculos.length===0)seed();
  normalize();
  setCloudUI();render();
  initCloud();
  reconnectMirror();
}
boot();
</script>
